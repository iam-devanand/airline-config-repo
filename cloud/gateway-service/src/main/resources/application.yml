server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway-service

  config:
    import: configserver:${CONFIG_SERVER_URL:http://localhost:8888}

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/users/**

            - id: location-service
              uri: lb://LOCATION-SERVICE
              predicates:
                - Path=/api/locations/**

            - id: airline-service
              uri: lb://AIRLINE-CORE-SERVICE
              predicates:
                - Path=/api/airlines/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: "*"